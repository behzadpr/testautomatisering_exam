name: CI

on:
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pytest
        run: pip install pytest

      - name: Run backend tests
        run: python -m pytest backend/tests/ -v

